<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    {% seo %}
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#fafefc">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <link href="https://fonts.googleapis.com/css2?family=Ephesis&family=Merriweather:wght@300;400;700&family=Merriweather+Sans:wght@300;400;500;700&family=Smokum&display=swap" rel="stylesheet">
    {% include head-custom.html %}
    <script defer src="{{ '/assets/js/site.js' | relative_url }}"></script>
  </head>

  <body class="site-shell">
    {% include nav.html %}

    <main id="content" class="docs-main" role="main">
      <section class="wrapper docs-hero-wrap">
        <div class="docs-hero card-surface">
          <p class="eyebrow-label">WAH-<em>i</em> documentation</p>
          <h1 class="docs-hero__title">{{ page.title | default: site.title }}</h1>
          <p class="docs-hero__description">{{ page.description | default: site.description }}</p>
          {% if page.url == '/' %}
            <div class="docs-hero__actions">
              <a class="button-pill button-pill--primary" href="{{ '/download/' | relative_url }}">Download</a>
              <a class="button-pill" href="{{ '/quickstart/' | relative_url }}">Quickstart</a>
              <a class="button-pill" href="https://github.com/raviumadi/WAHi-Optimiser" target="_blank" rel="noreferrer">GitHub</a>
            </div>
          {% endif %}
        </div>
      </section>

      <section class="wrapper docs-content-wrap">
        <article class="content-surface prose">
          {{ content }}
        </article>
      </section>
    </main>

    {%- include footer_custom.html -%}
  </body>
</html>
